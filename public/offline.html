<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Together+</title>
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; background: #f7f1e6; color: #2a2520; }
      .wrap { min-height: 100%; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 420px; text-align: center; }
      h1 { font-family: "Cormorant Garamond", Georgia, serif; font-size: 36px; margin: 0 0 12px; letter-spacing: -0.01em; }
      p { color: #6a5f55; line-height: 1.55; margin: 0 0 20px; }
      .heart { font-size: 28px; color: #b08a4a; }
      button { background: #2f5d3a; color: #fdf8ec; border: 0; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="heart">♥</div>
        <h1>You're offline</h1>
        <p>Your love story is safe. Reconnect to keep sharing moments together.</p>
        <button onclick="location.reload()">Try again</button>
      </div>
    </div>
  </body>
</html>
